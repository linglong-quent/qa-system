name: QA Nightly Scan (Gate0-Gate9)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: P0 — QA Self-Test
        id: self_test
        continue-on-error: true
        run: python scripts/qa_self_test.py

      - name: P1 — Full Check
        id: qa_check
        continue-on-error: true
        run: python scripts/qa_check.py health

      - name: P2 — Gate3 SchemaValidator
        id: schema_validator
        continue-on-error: true
        run: python scripts/qa_gate.py --gate=3

      - name: P3 — Gate3.1 FrameworkSelfAudit
        id: framework_audit
        continue-on-error: true
        run: python scripts/qa_gate.py --gate=3.1

      - name: P4 — Classify
        id: classify
        continue-on-error: true
        run: python scripts/qa_classify.py

      - name: P4b — Feedback
        id: feedback
        continue-on-error: true
        run: python scripts/qa_plan.py feedback

      - name: P5 — Gate0-Gate9 Full Gate
        id: final_gate
        run: python scripts/qa_gate.py

      - name: Archive QA Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-nightly
          path: |
            .ai/logs/qa-report.json
            .ai/fixes/pending.json
          retention-days: 90

      - name: Nightly Summary
        if: always()
        run: |
          echo "QA Nightly Scan Complete"
          if [ -f .ai/logs/qa-report.json ]; then
            ERRORS=$(python -c "import json; r=json.load(open('.ai/logs/qa-report.json')); print(r['errors'])")
            echo "Total errors: $ERRORS"
          fi
