name: QA Self-Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

jobs:
  self-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: QA Self Test
        run: python scripts/qa_self_test.py

      - name: QA Full Check
        run: python scripts/qa_check.py health

      - name: QA Gate
        run: python scripts/qa_gate.py --report

      - name: Upload QA Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-report
          path: .ai/logs/qa-report.json
          retention-days: 7

