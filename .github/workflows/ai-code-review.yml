name: QA Self-Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:  # 昤宝宝可通过 API 远程触发 CI

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: |
          pip install --upgrade pyyaml
          python -c "import yaml; print(f'pyyaml {yaml.__version__} OK')"

      # ═══════════════════════════════════════════════
      # A++ 质量标准 — 全部阻断式
      # ═══════════════════════════════════════════════

      # ── P0: 系统自检 ──
      - name: P0 — QA Self-Test
        run: python scripts/qa_self_test.py

      # ── P1: Gate0 Issue 规范 ──
      - name: P1 — Gate0 Issue Compliance
        run: python scripts/qa_gate.py --gate=0

      # ── P2: 全量检查（19 checker + Python工程结构，阻断式） ──
      - name: P2 — QA Full Check
        run: python scripts/qa_check.py health

      # ── P3: Gate3 SchemaValidator（宪法四） ──
      - name: P3 — Gate3 SchemaValidator
        run: python scripts/qa_gate.py --gate=3

      # ── P4: Gate3.1 框架自审（权重错误阻断） ──
      - name: P4 — Gate3.1 Framework Self-Audit
        run: python scripts/qa_gate.py --gate=3.1

      # ── P5: Gate0-Gate9 十层门禁总闸 ──
      - name: P5 — QA Gate (Gate0-Gate9)
        run: python scripts/qa_gate.py

      # ── 报告上传（always: 就算失败也上传） ──
      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-report
          path: .ai/logs/qa-report.json
          retention-days: 90
