# ──────────────────────────────────────────────
# AI Pre-PR Review
# 向 LLM API 发送 PR diff，自动检查合规性
# 失败则阻断合并
# ──────────────────────────────────────────────

name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.ref }}-ai-review
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  review:
    name: "AI Pre-PR 合规审查"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整 diff

      - name: 获取 PR 变更文件
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **/*.py
          separator: ","

      - name: 跳过（无 Python 文件变更）
        if: steps.changed-files.outputs.any_changed != 'true'
        run: echo "无 Python 变更，跳过 AI Review" && exit 0

      - name: 获取 diff
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.py')
          echo "DIFF<<EOF" >> $GITHUB_ENV
          echo "$DIFF" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: AI Review
        id: ai-review
        uses: openai/openai-action@v1
        continue-on-error: true
        with:
          api_key: ${{ secrets.AI_REVIEW_KEY }}
          model: ${{ vars.AI_REVIEW_MODEL || 'gpt-4o' }}
          prompt: |
            你是一位严格的量化系统代码审查专家。请检查以下 PR diff，按类别标记问题。

            ## 严格检查的项目（发现即阻断，回复 FAIL）
            - 硬编码 API Key / Secret / Token / 密码
            - `except: pass` 或 `except Exception: pass`
            - `eval()` / `exec()`
            - `inplace=True`
            - `iterrows()` / `apply(fn, axis=1)` 处理已知大数据集
            - 在 for 循环内调用数据库或外部 API
            - 拼接 SQL 查询（SQL 注入风险）
            - `print()` 在非测试文件中的使用
            - 时区不明确的时间处理（`datetime.now()` / `datetime.utcnow()`）
            - 函数超过 200 行（新增代码）
            - 函数参数超过 8 个（新增函数）
            - 嵌套超过 5 层（新增逻辑块）

            ## 警告检查的项目（回复 WARN，不阻断但需 Reviewer 确认）
            - 新增依赖未在 pyproject.toml 声明
            - 缺少类型注解（新增函数）
            - 不处理 NaN 的数据处理
            - 缺少 docstring 的新增函数
            - 注释中可能存在的密钥/Token

            ## 回复格式
            如果发现任何 FAIL 项，第一行写 `BLOCKED`，然后逐条列出。
            如果只有 WARN 项，第一行写 `WARN_ONLY`，然后逐条列出。
            如果没有问题，第一行写 `PASS`。
            
            DIFF:
            ${{ env.DIFF }}

      - name: 阻断合并（发现严重问题）
        if: startsWith(steps.ai-review.outputs.result, 'BLOCKED')
        run: |
          echo "❌ AI Review 阻断：发现必须修复的问题"
          echo "${{ steps.ai-review.outputs.result }}"
          exit 1

      - name: 发布 Review 评论
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🤖 AI Code Review 结果\n\n${{ steps.ai-review.outputs.result }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
