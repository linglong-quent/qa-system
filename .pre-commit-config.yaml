repos:
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        name: black-format
        args: ["--line-length=120"]
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort-imports
        args: ["--profile=black", "--line-length=120"]

  - repo: local
    hooks:
      - id: qa-gate
        name: qa-gate (0-pollution mode)
        entry: cmd /c "set QA_SYSTEM_ROOT=D:\Users\pc\.kun\qa-system&& set QA_PROJECT_NAME=qa-system&& python D:\Users\pc\.kun\qa-system/scripts/qa_gate.py"
        language: system
        pass_filenames: false
        always_run: true
