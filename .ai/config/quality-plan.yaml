plan_version: '1.0'
last_updated: '2026-07-17'
project_type: qa-system
quality_objectives:
- id: Q1
  name: 零硬编码密钥
  standard: OWASP Top 10 A2
  enforced_by: secret_check
  severity: BLOCKER
  target: 任何提交中零硬编码密钥
- id: Q2
  name: 架构边界合规
  standard: 'NASA Power of 10 #3'
  enforced_by: import_boundary
  severity: BLOCKER
  target: _core/ 不导入 dev-only 模块
- id: Q3
  name: 没有前视偏差
  standard: 量化交易最佳实践
  enforced_by: lookahead_check
  severity: BLOCKER
  target: 回测代码中无 shift(-N) 穿越
- id: Q4
  name: 代码可维护
  standard: ISO 25010 Maintainability
  enforced_by: deadcode_check
  severity: WARN
  target: 无多余公共符号
- id: Q5
  name: 配置自洽
  standard: IEEE 730
  enforced_by: config_audit
  severity: WARN
  target: 所有配置可解析、无废弃文件
- id: Q6
  name: AI 编码有约束
  standard: ISO 25010
  enforced_by: claude_validation
  severity: WARN
  target: CLAUDE.md 存在且规则完整
risk_zones:
- zone: core
  path_pattern: scripts/
  risk_level: critical
  require_gates:
  - Q1
  - Q2
  - Q3
  - Q4
- zone: strategy
  path_pattern: strategy/|strategies/
  risk_level: high
  require_gates:
  - Q1
  - Q3
  - Q4
- zone: data
  path_pattern: data/|feeder/
  risk_level: medium
  require_gates:
  - Q1
  - Q4
- zone: tools
  path_pattern: scripts/
  risk_level: low
  require_gates:
  - Q4
gate_threshold:
  BLOCKER: 零容忍，有则阻断
  WARN: 建议修复，不阻断
