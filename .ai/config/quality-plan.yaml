# quality-plan.yaml — 质量规划（PDCA 闭环）
# 框架手册：QA-SYS 规划器输入，定义质量目标、检查频次、责任人
version: '4.0'
last_updated: '2026-07-20'
plan_do_check_act:
  enabled: true
  cycle_id: "PDCA-001"
  plan:
    description: "玲珑量化质量规划"
    objectives:
      - id: OBJ-01
        name: "零阻断级违规"
        target: 0
        metric: "gate_blockers"
        deadline: "持续"
      - id: OBJ-02
        name: "文档覆盖率 ≥80%"
        target: 80
        metric: "doc_coverage_pct"
        deadline: "2026-Q3"
      - id: OBJ-03
        name: "测试覆盖率 ≥60%"
        target: 60
        metric: "test_coverage_pct"
        deadline: "2026-Q4"
      - id: OBJ-04
        name: "代码健康评分 ≥85"
        target: 85
        metric: "health_score"
        deadline: "持续"
  do:
    check_frequency: "每 PR"
    tools:
      - "qa_check.py (19 checker)"
      - "qa_gate.py (Gate0-Gate9)"
      - "pre-commit (15 hooks)"
  check:
    review_gates:
      - "Gate3 SchemaValidator"
      - "Gate3.1 框架自审"
      - "Gate5 评分检测"
    metrics_tracked:
      - "errors_per_checker"
      - "gate_pass_rate"
      - "issue_resolution_time"
  act:
    feedback_loop:
      - "qa_defect.py create/close/suspend"
      - "qa_classify.py 问题分类 → pending.json"
      - "qa_ai.py fix-loop AI 自动修复"
    escalation:
      repeated_defects: "loop_count > 3 → 人工介入"
      gate_blocked: "3 consecutive → 暂停发布"
quality_targets:
  code_quality:
    min_score: 60
    target_score: 85
    red_line: 40
  documentation:
    min_coverage: 50
    target_coverage: 80
  testing:
    min_coverage: 15
    target_coverage: 60
