# secrets-scan.yaml — 硬编码密钥扫描配置
# 由 chk_secretchecker.py 读取
# 参考: CWE-798 / OWASP Top 10 A03:2021
version: "1.0"
last_updated: "2026-07-17"

# ── 扫描范围 ──
scan:
  enabled: true
  # 被扫描的目录
  scan_dirs:
    - "src/"
    - "scripts/"
    - ".ai/config/"
    - ".github/"

  # 扫描的文件扩展名
  scan_extensions:
    - ".py"
    - ".yaml"
    - ".yml"
    - ".json"
    - ".toml"
    - ".ini"
    - ".cfg"
    - ".env"
    - ".sh"
    - ".bat"
    - ".ps1"

# ── 排除规则 ──
exclude:
  # 排除的子目录
  dirs:
    - ".git"
    - "__pycache__"
    - "node_modules"
    - ".venv"
    - "venv"
    - ".egg-info"
    - "dist"
    - "build"
    - "_deprecated"
    - "archive"

  # 行级豁免标记（含以下关键词的行跳过）
  exempt_keywords:
    - "mock"
    - "fake"
    - "dummy"
    - "placeholder"
    - "example"
    - "sample"
    - "test_password"
    - "test_secret"
    - "test_key"
    - "no-secret-check"

# ── 检测模式 ──
patterns:
  # 硬编码密码
  password:
    enabled: true
    pattern: '(?i)(password|passwd|pwd)\s*[:=]\s*["\''].+?["\''].*'
    severity: "HIGH"
    description: "硬编码密码"
    reference: "CWE-798"

  # 硬编码密钥/API Key
  api_key:
    enabled: true
    pattern: '(?i)(secret|api_key|apikey|api\.key)\s*[:=]\s*["\''].{8,}["\''].*'
    severity: "HIGH"
    description: "硬编码 API Key"
    reference: "CWE-798"

  # 硬编码 Token
  token:
    enabled: true
    pattern: '(?i)(token|access_token|auth_token|bearer)\s*[:=]\s*["\''].{8,}["\''].*'
    severity: "HIGH"
    description: "硬编码 Token"
    reference: "CWE-798"

  # 硬编码私钥
  private_key:
    enabled: true
    pattern: '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
    severity: "CRITICAL"
    description: "嵌入 PEM 私钥"
    reference: "CWE-798"

  # GitHub Token
  github_token:
    enabled: true
    pattern: '(?i)ghp_\w{36}|gho_\w{36}|ghu_\w{36}|ghs_\w{36}'
    severity: "CRITICAL"
    description: "GitHub Token 暴露"
    reference: "CWE-798"

  # OpenAI API Key
  openai_key:
    enabled: true
    pattern: 'sk-[a-zA-Z0-9]{20,}'
    severity: "CRITICAL"
    description: "OpenAI API Key"
    reference: "CWE-798"

  # AWS Access Key
  aws_key:
    enabled: true
    pattern: 'AKIA[0-9A-Z]{16}'
    severity: "CRITICAL"
    description: "AWS Access Key (AKIA)"
    reference: "CWE-798"

  # JWT Token
  jwt_token:
    enabled: true
    pattern: '(?i)(jwt|jwe|jws)\s*=\s*["\''][\w-]+\.[\w-]+\.[\w-]+["\'']'
    severity: "HIGH"
    description: "硬编码 JWT Token"
    reference: "CWE-798"

  # AWS Secret Key
  aws_secret:
    enabled: true
    pattern: '(?i)aws_secret_access_key\s*[:=]\s*["\''].+?["\'']'
    severity: "CRITICAL"
    description: "AWS Secret Access Key"
    reference: "CWE-798"

# ── 动作配置 ──
action:
  # 严重级别阈值: CRITICAL/HIGH/MEDIUM/LOW
  fail_on: "HIGH"
  # 在 CI 中是否阻断构建
  block_ci: true
  # 在 pre-commit 中是否阻断提交
  block_commit: true
  # 错误消息模板
  message_template: "[SECRET-001] {path}:{line} 检测到 {description} -> 应从环境变量或密钥管理系统读取，请勿硬编码"
