name: AI Document Generation

on:
  pull_request:
    paths:
      - 'src/**.py'
      - 'config/**.yaml'
      - 'config/**.yml'
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      module:
        description: 'target module ID'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'dry-run mode'
        type: boolean
        default: false
      max_retries:
        description: 'max self-heal retries'
        type: number
        default: 3

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-doc-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: AI document generation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "AI document generation pipeline"
          if [ -f "scripts/ai_doc_generator.py" ]; then
            python scripts/ai_doc_generator.py ${{ inputs.module && format('--module {0}', inputs.module) || '--all' }} \
              ${{ inputs.dry_run && '--dry-run' || '' }} \
              --max-retries ${{ inputs.max_retries || 3 }}
          else
            echo "generator script not found, skipping"
          fi
      - name: Commit generated docs
        if: success()
        run: |
          git config user.name "AI Doc Generator"
          git config user.email "ai-doc-gen@noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "docs: AI auto-generated docs"
            git push
          fi
