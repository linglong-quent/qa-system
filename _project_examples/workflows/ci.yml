# P1 CI — Lint + Type Check + KUN Skill Scanners + Test
name: Linglong P1 CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "_deprecated/**"
      - "archive/**"
      - "*.md"
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 19 * * 1-5"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dev deps
        # pre-commit 版本锁定: black 24.4.2, isort 5.13.2, flake8 7.1.0, mypy 1.10.0
        # 与 .pre-commit-config.yaml 保持一致，避免「本地通过 CI 失败」
        run: pip install "black==24.4.2" "isort==5.13.2" "flake8==7.1.0" "mypy==1.10.0" "types-pyyaml" sqlfluff pyyaml pygments

      - name: Black format check
        run: black --check --line-length 120 --target-version py312 --exclude "_deprecated|archive|build|\.venv|_tmp" .

      - name: isort import check
        run: isort --check-only --profile black --line-length 120 --skip "_deprecated" --skip "archive" --skip "build" --skip ".venv" .

      - name: flake8 lint
        run: flake8 --max-line-length 120 --max-complexity 10 --extend-ignore E203,W503 --exclude _deprecated,archive,build,.venv,_dev,_ci_*,_tmp_*,_still_*,_e2e_*,_test_*,linglong/linglong,linglong/_still_*,linglong/_e2e_*,linglong/_test_*,bailian,scripts,data,logs,runtime,archive,tools .

      - name: mypy strict type check
        run: mypy --ignore-missing-imports .

      # sqlfluff SQL lint gate (disabled — needs ci_sqlfluff_gate.py)
      # - name: sqlfluff SQL lint gate
      #   run: python scripts/ci_sqlfluff_gate.py --strict

      # ---- KUN Skill Scanners (from pre-commit, now in CI) ----
      - name: G5 zero-print scan
        run: python scripts/skill/skill_g5_scan.py || true
      - name: G5A 11 rules scan
        run: python scripts/skill/skill_g5a_scan.py || true
      - name: ban_check 7 bans
        run: python scripts/skill/skill_ban_check.py --dir . || true
      - name: naming_check 10 prefixes
        run: python scripts/skill/skill_naming_check.py || true
      - name: readability check
        run: python scripts/skill/skill_readability_check.py || true
      - name: lint_all 5-in-1
        run: python scripts/skill/skill_lint_all.py || true
      - name: filename scan
        run: python scripts/skill/skill_filename_scan.py || true
      - name: future leak detect
        run: python scripts/skill/skill_future_leak.py --dir . || true
      - name: constant check
        run: python scripts/skill/skill_constant_check.py || true
      - name: log structure check
        run: python scripts/skill/skill_log_structure_check.py || true
      - name: SQL injection scan
        run: python scripts/skill/skill_sql_injection.py || true
      - name: layer check
        run: python scripts/skill/skill_layer_check.py || true
      - name: fuse detector
        run: python scripts/skill/skill_fuse_detector.py --self-check || true
      - name: doc consistency
        run: python scripts/skill/skill_doc_consistency.py || true
      - name: asset scan
        run: python scripts/skill/skill_asset_scan.py || true
      - name: registry guard
        run: python scripts/skill/skill_registry_guard.py || true
      - name: dir governance
        run: python scripts/skill/skill_dir_governance.py || true

  # ---- QA Preflight Gate (P-A1) — QA 系统自身质量检查 ----
  qa-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml
      - name: QA Preflight Gate
        continue-on-error: true
        run: |
          echo "=== QA 系统自身质量检查 (Preflight Gate) ==="
          python scripts/check_doc_health.py preflight --project-root .
          echo ""
          echo "=== 文件完整性校验 (Tripwire) ==="
          python scripts/check_doc_health.py integrity --project-root .
          echo "exit_code=$?"

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Compile check
        run: |
          python -c "
          import py_compile, os, sys
          errors = 0
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('_deprecated','archive','build','.mypy_cache','__pycache__','.git','.venv_linglong')]
              for f in files:
                  if f.endswith('.py') and '__pycache__' not in root:
                      try: py_compile.compile(os.path.join(root,f), doraise=True)
                      except py_compile.PyCompileError as e: errors += 1; print(f'  ERROR: {e}', file=sys.stderr)
          print(f'Compile check: {errors} error(s)')
          sys.exit(1 if errors > 0 else 0)
          "

      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            python -m pytest tests/ -v --tb=short --cov=. --cov-report=term
          else
            echo "No tests/ directory yet, skipping"
          fi
        continue-on-error: true
