name: AI Document Build

on:
  pull_request:
    paths:
      - 'docs/**'
      - '_docs/**'
    branches: [main, develop]

permissions:
  contents: read

jobs:
  doc-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build documentation
        run: |
          echo "Documentation build pipeline"
          python -c "print('build passed')"
