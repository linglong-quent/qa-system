# 文件完整性校验配置（Tripwire 模式）
# 理论依据: NIST SP 800-53 SI-7 / ISO 27001 A.12.4 / SLSA Level 2
# 机制: SHA256 哈希锁定 → 每次 CI 运行时校验 → 不匹配阻断
# 更新: 文件合法变更时，coordinator lock 保护写入 → 重新计算哈希 → commit
file_integrity:
  enabled: true
  blocking: true                    # true=哈希不匹配直接阻断 CI
  last_verified: "2026-07-16"
  verify_command: "check_doc_health integrity"

  # QA 核心文件清单 — 变更必须审批
  watchlist:
    - path: "scripts/check_doc_health.py"
      sha256: "83b92fb8cc4839c8164362bfd21b7b2dc3e39fbbbf0efdd6ab830a07bc52fc64"
      description: "QA 评分引擎 + 20 个子命令（含 integrity）"
      severity: "CRITICAL"
      owner: "QA-Framework"

    - path: "scripts/coordinator.py"
      sha256: "5c4d5685678b9dc8dfab769c67085dc5c6069562480ffe7afcc5659112d36214"
      description: "P-A4 原子锁管理器"
      severity: "CRITICAL"
      owner: "QA-Framework"

    - path: ".ai/config/review-rules.yaml"
      sha256: "fc853aede4d448bc218432ca0a966b4b62de012a3574e43ec6d6b75b771a7c16"
      description: "审查规则配置（含 meta_quality）"
      severity: "CRITICAL"
      owner: "QA-Framework"

    - path: ".pre-commit-config.yaml"
      sha256: "4a8bb8e4ee7ebab8876f92625dd5aca2b499789c600af0499e132bad3dd361bd"
      description: "pre-commit hook 配置"
      severity: "HIGH"
      owner: "QA-Framework"

    - path: ".github/workflows/ci.yml"
      sha256: "324c0d774ad795fbca9344dbeff07359aa01a8fa32b9d5700dbf5da922d57f2e"
      description: "P1 CI 流水线（含 qa-preflight + integrity）"
      severity: "CRITICAL"
      owner: "QA-Framework"

    - path: ".ai/config/coordinator-config.yaml"
      sha256: "045556e43846ca0f00762f45732caddc88b23d5749ab6a169d431717fd2c7d54"
      description: "协调器配置"
      severity: "HIGH"
      owner: "QA-Framework"

    - path: ".ai/schemas/coordinator.schema.json"
      sha256: "257eaf521a5ed5a829cd1a357f428b1008a82fd10cb020c86f9387d272845164"
      description: "协调器 Schema"
