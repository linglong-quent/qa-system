# token-budget.yaml — Token 预算配置
# 定义 CI/AI 各环节的 Token 配额和告警阈值
version: "1.0"
last_updated: "2026-07-16"

budgets:
  doc_scan:
    max_tokens: 50000
    warning_at: 40000
    per_file_max: 5000
  code_review:
    max_tokens: 100000
    warning_at: 80000
    per_file_max: 10000
  doc_generation:
    max_tokens: 200000
    warning_at: 150000
  self_heal:
    max_tokens: 50000
    max_retries: 3

# 预算超出时行为
on_budget_exceeded: "warn"  # warn | block | fallback
fallback_model: "claude-3-haiku"
