# Skill 注册表
# 所有 Skill 必须在此注册，MR 无注册条目直接阻断
# API 网关读取此文件自动注册路由
#
# 字段说明:
#   type: script | instruction             — script=有脚本文件; instruction=纯文档，AI生成胶水代码
#   status: draft | stable | deprecated   — draft=未定型可随意改; stable=定型需走MR; deprecated=废弃
#   tier: basic | premium | enterprise     — 套餐分级。SaaS 网关按此字段开放能力
#   quality_gates: [str, ...]               — 关联的质量关卡编号
#   exit_codes: [int, ...]                  — 允许的退出码集合
#   doc: str                                — type=instruction 时必填，指向 Markdown 说明文档
#   prompt: str                             — type=instruction 时建议填，告诉 AI 怎么做
#   api:                                     — API 网关相关配置（统一子节点收拢）
#     public: bool                          — true=对外 API 开放; false=仅内部调用
#     timeout_ms: int                       — 单 Skill 执行超时（毫秒），默认 5000
#     rate_limit_default: int               — 默认租户调用频次（次/分），网关可按租户覆盖
#
# 生命周期: draft(文档) → stable(脚本+文档) → deprecated(废弃)
#   draft 期: 只有 doc/prompt，AI 读说明后自己写胶水代码运行，随时改
#   stable 期: 抽为 skill_*.py，走 MR 审批
#
# 标准化记录:
#   2026-07-07 CB: 全 Skill 字段对齐
#   2026-07-09 KUN: 新增 type/status 字段，双轨制（script + instruction）

